<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>💖 Kitty Love 💖</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(#ffd6e8, #e0f7ff);
    }

    /* LOGIN */
    #login {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
    }

    #login h2 {
      color: #ff6fa5;
    }

    #login input {
      padding: 10px;
      border: none;
      border-radius: 12px;
      background: #f3f3f3;
      outline: none;
    }

    #login button {
      margin-top: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 12px;
      background: #ff9ecf;
      color: white;
      cursor: pointer;
    }

    #login button:hover {
      background: #ff6fa5;
    }

    .kitty {
      font-size: 40px;
      margin-bottom: 10px;
    }

    canvas {
      display: none;
    }

    #text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 48px;
      font-weight: bold;
      color: #ff6fa5;
      text-shadow: 0 0 15px rgba(255,105,180,0.8);
      display: none;
      pointer-events: none;
    }

    #hint {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: #ff6fa5;
      font-size: 14px;
      display: none;
    }

    /* 💕 HEART FLOAT */
    #hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      color: #ff6fa5;
      animation: floatUp linear forwards;
    }

    @keyframes floatUp {
      from {
        transform: translateY(100vh) scale(1);
        opacity: 1;
      }
      to {
        transform: translateY(-10vh) scale(1.5);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

<!-- HEART BACKGROUND -->
<div id="hearts"></div>

<!-- LOGIN -->
<div id="login">
  <div class="kitty">🎀🐱</div>
  <h2>Hello Kitty Login 💖</h2>
  <input type="password" id="password" placeholder="Nhập mật khẩu...">
  <br><br>
  <button onclick="checkPass()">Vào ✨</button>
  <p id="error" style="color:#ff6fa5;"></p>
</div>

<canvas id="canvas"></canvas>
<div id="text">Iu Linh 💕</div>
<div id="hint">👉 giữ màn hình để hiện trái tim 💖</div>

<script>
  const correctPassword = "2310";

  function checkPass() {
    const input = document.getElementById("password").value;
    if (input === correctPassword) {
      document.getElementById("login").style.display = "none";
      const canvas = document.getElementById("canvas");
      canvas.style.display = "block";
      document.getElementById("hint").style.display = "block";
      startAnimation();
    } else {
      document.getElementById("error").innerText = "Sai rồi 😭";
    }
  }

  function startAnimation() {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const text = document.getElementById("text");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let clouds = [];

    for (let i = 0; i < 150; i++) {
      clouds.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height
      });
    }

    let formingHeart = false;

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#fff";

      clouds.forEach(c => {
        ctx.beginPath();
        ctx.arc(c.x, c.y, 4, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function update() {
      clouds.forEach((c, i) => {
        if (formingHeart) {
          let t = (i / clouds.length) * Math.PI * 2;
          let heartX = 16 * Math.pow(Math.sin(t), 3);
          let heartY = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

          let scale = 10;
          let targetX = canvas.width/2 + heartX * scale;
          let targetY = canvas.height/2 + heartY * scale;

          c.x += (targetX - c.x) * 0.05;
          c.y += (targetY - c.y) * 0.05;
        } else {
          c.x += Math.random() - 0.5;
          c.y += Math.random() - 0.5;
        }
      });

      text.style.display = formingHeart ? "block" : "none";
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    canvas.addEventListener("mousedown", () => formingHeart = true);
    canvas.addEventListener("mouseup", () => formingHeart = false);
    canvas.addEventListener("touchstart", () => formingHeart = true);
    canvas.addEventListener("touchend", () => formingHeart = false);

    loop();
  }

  /* 💕 HEART GENERATOR */
  function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerText = "💖";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 20) + "px";
    heart.style.animationDuration = (3 + Math.random() * 3) + "s";

    document.getElementById("hearts").appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
  }

  setInterval(createHeart, 300);
</script>

</body>
</html>
