<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>💖 Galaxy Love 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  background: black;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
}

/* LOGIN */
#login {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  color: white;
}

#login input {
  padding: 10px;
  border-radius: 10px;
  border: none;
}

/* TEXT */
#text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 55px;
  color: #ff9ecf;
  text-shadow:
    0 0 10px #ff6fa5,
    0 0 30px #ff6fa5,
    0 0 60px #ff6fa5;
  display: none;
}
</style>
</head>

<body>

<div id="login">
  <h2>Login 💖</h2>
  <input type="password" id="password" placeholder="Nhập mật khẩu..."><br><br>
  <button onclick="checkPass()">Vào ✨</button>
  <p id="error"></p>
</div>

<canvas id="c"></canvas>
<div id="text">Iu Linh 💕</div>

<script>
const correctPassword = "2310";

function checkPass() {
  if (password.value === correctPassword) {
    login.style.display = "none";
    text.style.display = "block";
  } else {
    error.innerText = "Sai rồi 😭";
  }
}

/* 🌌 GALAXY ENGINE */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let stars = [];
for (let i = 0; i < 400; i++) {
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: Math.random()*2,
    speed: Math.random()*0.5
  });
}

/* 💫 HEART SHAPE */
function heart(t){
  return {
    x: 16*Math.pow(Math.sin(t),3),
    y: -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
  }
}

let time = 0;

function draw() {
  time += 0.01;

  /* nền fade */
  ctx.fillStyle = "rgba(0,0,20,0.3)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  /* ⭐ sao */
  stars.forEach(s=>{
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
    ctx.fill();

    s.y += s.speed;
    if(s.y>canvas.height) s.y=0;
  });

  /* 🌈 nebula glow */
  let g = ctx.createRadialGradient(
    canvas.width/2, canvas.height/2, 50,
    canvas.width/2, canvas.height/2, 500
  );
  g.addColorStop(0,"rgba(255,100,200,0.25)");
  g.addColorStop(0.5,"rgba(100,100,255,0.15)");
  g.addColorStop(1,"transparent");

  ctx.fillStyle = g;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  /* 💖 HEART GALAXY */
  for(let i=0;i<200;i++){
    let t = (i/200)*Math.PI*2 + time;

    let h = heart(t);

    let x = canvas.width/2 + h.x*12;
    let y = canvas.height/2 + h.y*12;

    ctx.fillStyle = "rgba(255,150,200,0.9)";
    ctx.beginPath();
    ctx.arc(x,y,2,0,Math.PI*2);
    ctx.fill();
  }

  requestAnimationFrame(draw);
}

draw();

/* 💥 CLICK NỔ TIM */
document.addEventListener("click",e=>{
  for(let i=0;i<15;i++){
    let h=document.createElement("div");
    h.innerText="💖";
    h.style.position="absolute";
    h.style.left=e.clientX+"px";
    h.style.top=e.clientY+"px";
    h.style.fontSize=(15+Math.random()*20)+"px";
    h.style.transition="1s";
    document.body.appendChild(h);

    setTimeout(()=>{
      h.style.transform="translateY(-100px)";
      h.style.opacity="0";
    },10);

    setTimeout(()=>h.remove(),1000);
  }
});
</script>

</body>
</html>
