<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>💖 Galaxy Love 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at bottom, #2b1055, #000);
}

/* 🌌 CANVAS */
canvas {
  position: absolute;
  top: 0;
  left: 0;
}

/* LOGIN */
#login {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  color: white;
}

#login input {
  padding: 10px;
  border: none;
  border-radius: 12px;
  outline: none;
}

#login button {
  margin-top: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 12px;
  background: #ff6fa5;
  color: white;
  cursor: pointer;
}

/* TEXT */
#text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 50px;
  color: #ff9ecf;
  text-shadow: 0 0 25px #ff6fa5;
  display: none;
}

/* HEART */
.heart {
  position: absolute;
  animation: floatUp linear forwards;
}

@keyframes floatUp {
  to {
    transform: translateY(-200px);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div id="login">
  <h2>Login 💖</h2>
  <input type="password" id="password" placeholder="Nhập mật khẩu..."><br><br>
  <button onclick="checkPass()">Vào ✨</button>
  <p id="error"></p>
</div>

<canvas id="stars"></canvas>
<div id="text">Iu Linh 💕</div>

<script>
const correctPassword = "2310";

function checkPass() {
  if (document.getElementById("password").value === correctPassword) {
    document.getElementById("login").style.display = "none";
    document.getElementById("text").style.display = "block";
  } else {
    document.getElementById("error").innerText = "Sai rồi 😭";
  }
}

/* 🌌 STAR GALAXY */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 300; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speed: Math.random() * 0.5
  });
}

function drawStars() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  stars.forEach(s => {
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();

    s.y += s.speed;
    if (s.y > canvas.height) s.y = 0;
  });

  requestAnimationFrame(drawStars);
}

drawStars();

/* 💥 CLICK NỔ TIM */
document.addEventListener("click", e => {
  for (let i = 0; i < 10; i++) {
    let h = document.createElement("div");
    h.className = "heart";
    h.innerText = "💖";
    h.style.left = e.clientX + "px";
    h.style.top = e.clientY + "px";
    h.style.fontSize = (15 + Math.random()*20) + "px";
    h.style.animationDuration = "1s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),1000);
  }
});
</script>

</body>
</html>
