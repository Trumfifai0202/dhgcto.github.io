<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>💖 Galaxy Love 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  background: black;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* LOGIN */
#login {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  color: white;
  z-index: 999;
}

/* TEXT */
#text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 55px;
  color: #ff9ecf;
  text-shadow: 0 0 20px #ff6fa5,0 0 40px #ff6fa5;
  z-index: 10;
}

/* hint */
#hint {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
  color: #ff9ecf;
  z-index: 10;
}

/* music btn */
#musicBtn {
  position: absolute;
  top: 20px;
  right: 20px;
  z-index: 20;
  background: rgba(255,255,255,0.2);
  padding: 10px;
  border-radius: 50%;
  cursor: pointer;
}

/* HEART */
.heart {
  position: absolute;
  pointer-events: none;
  animation: floatUp 2s linear forwards;
  z-index: 1000;
}

@keyframes floatUp {
  to {
    transform: translateY(-150px);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div id="login">
  <h2>Login 💖</h2>
  <input type="password" id="password"><br><br>
  <button onclick="checkPass()">Vào ✨</button>
  <p id="error"></p>
</div>

<canvas id="c"></canvas>

<div id="text"></div>
<div id="hint">👉 giữ màn hình để spam tim 💖</div>
<div id="musicBtn">🔊</div>

<audio id="music" loop>
  <source src="https://files.catbox.moe/1w7z3h.mp3" type="audio/mpeg">
</audio>

<script>
const correctPassword="2310";

/* LOGIN */
function checkPass(){
  if(password.value===correctPassword){
    login.style.display="none";
    startTyping();
    music.play();
  }else{
    error.innerText="Sai rồi 😭";
  }
}

/* 💌 typing text */
function startTyping(){
  let txt="Iu Linh 💕";
  let i=0;
  let el=document.getElementById("text");

  function type(){
    if(i<txt.length){
      el.innerHTML+=txt[i];
      i++;
      setTimeout(type,100);
    }
  }
  type();
}

/* 🎵 music toggle */
let playing=true;
musicBtn.onclick=()=>{
  if(playing){
    music.pause();
    musicBtn.innerText="🔇";
  }else{
    music.play();
    musicBtn.innerText="🔊";
  }
  playing=!playing;
};

/* 🌌 GALAXY */
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
resize();
onresize=resize;

let stars=[];
for(let i=0;i<400;i++){
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*2,
    speed:Math.random()*0.5
  });
}

function heart(t){
  return {
    x:16*Math.pow(Math.sin(t),3),
    y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
  }
}

let time=0;

function draw(){
  time+=0.01;

  ctx.fillStyle="rgba(0,0,20,0.3)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();

    s.y+=s.speed;
    if(s.y>canvas.height)s.y=0;
  });

  /* nebula */
  let g=ctx.createRadialGradient(
    canvas.width/2,canvas.height/2,50,
    canvas.width/2,canvas.height/2,500
  );
  g.addColorStop(0,"rgba(255,100,200,0.25)");
  g.addColorStop(1,"transparent");
  ctx.fillStyle=g;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  /* heart galaxy */
  for(let i=0;i<200;i++){
    let t=(i/200)*Math.PI*2+time;
    let h=heart(t);

    ctx.beginPath();
    ctx.arc(
      canvas.width/2+h.x*12,
      canvas.height/2+h.y*12,
      2,0,Math.PI*2
    );
    ctx.fillStyle="pink";
    ctx.fill();
  }

  /* 🌠 sao băng */
  if(Math.random()<0.02){
    let x=Math.random()*canvas.width;
    let y=Math.random()*canvas.height/2;

    ctx.strokeStyle="white";
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.lineTo(x+100,y+50);
    ctx.stroke();
  }

  requestAnimationFrame(draw);
}
draw();

/* 💖 giữ tạo tim */
let holding=false;
onmousedown=()=>holding=true;
onmouseup=()=>holding=false;

setInterval(()=>{
  if(holding) createHeart(innerWidth/2,innerHeight/2);
},100);

/* 💥 click nổ tim */
onclick=e=>{
  for(let i=0;i<10;i++){
    createHeart(e.clientX,e.clientY);
  }
};

/* 💕 tim */
function createHeart(x,y){
  let h=document.createElement("div");
  h.className="heart";
  h.innerText=["💖","💕","💗","💘"][Math.floor(Math.random()*4)];
  h.style.left=x+"px";
  h.style.top=y+"px";
  h.style.fontSize=(15+Math.random()*20)+"px";
  document.body.appendChild(h);

  setTimeout(()=>h.remove(),2000);
}

/* 💕 tim bay nền */
setInterval(()=>{
  createHeart(Math.random()*innerWidth,innerHeight);
},300);
</script>

</body>
</html>
